<svg width="900" height="540" viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; }</style>
  </defs>

  <!-- Background -->
  <rect width="900" height="540" fill="#0B1020" rx="12"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" fill="#C9922A" font-size="16" font-weight="700" letter-spacing="2">KEYWORD OPPORTUNITY MATRIX</text>
  <text x="450" y="54" text-anchor="middle" fill="#5A5E70" font-size="11" letter-spacing="0.5">Thailand Expat Market — Search Volume vs Competition Level</text>

  <!-- Chart area: x=80 y=70 w=760 h=380, center=(460,260) -->
  <!-- Quadrant fills -->
  <!-- Top-left: Low Volume, Low Competition -->
  <rect x="80" y="70" width="380" height="190" fill="#0A0F1E" rx="0"/>
  <!-- Top-right: High Volume, Low Competition = OPPORTUNITY -->
  <rect x="460" y="70" width="380" height="190" fill="#0A1E0D" rx="0"/>
  <!-- Bottom-left: Low Volume, High Competition -->
  <rect x="80" y="260" width="380" height="190" fill="#0A0F1E" rx="0"/>
  <!-- Bottom-right: High Volume, High Competition -->
  <rect x="460" y="260" width="380" height="190" fill="#1A1200" rx="0"/>

  <!-- Chart border -->
  <rect x="80" y="70" width="760" height="380" fill="none" stroke="#1F2937" stroke-width="1.5" rx="6"/>

  <!-- Axes (center lines) -->
  <line x1="460" y1="70" x2="460" y2="450" stroke="#2D3748" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="80" y1="260" x2="840" y2="260" stroke="#2D3748" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Quadrant labels -->
  <text x="270" y="100" text-anchor="middle" fill="#5A5E70" font-size="11" font-weight="600" letter-spacing="1">LONG TAIL TARGETS</text>
  <text x="650" y="100" text-anchor="middle" fill="#34D399" font-size="12" font-weight="700" letter-spacing="1">✅ ACT NOW</text>
  <text x="650" y="116" text-anchor="middle" fill="#34D399" font-size="10" letter-spacing="0.5">WINDOW CLOSING</text>
  <text x="270" y="292" text-anchor="middle" fill="#5A5E70" font-size="11" font-weight="600" letter-spacing="1">AVOID / LOW ROI</text>
  <text x="650" y="292" text-anchor="middle" fill="#F59E0B" font-size="11" font-weight="600" letter-spacing="1">HIGH COMPETITION</text>
  <text x="650" y="308" text-anchor="middle" fill="#8B8FA8" font-size="10">Target once authority built</text>

  <!-- ── ACT NOW keywords (top-right quadrant) ── -->
  <!-- "Thailand visa changes April 2026" -->
  <rect x="490" y="128" width="210" height="28" fill="#0D2E14" rx="14" stroke="#34D399" stroke-width="1.5"/>
  <text x="595" y="147" text-anchor="middle" fill="#34D399" font-size="11" font-weight="600">Thailand visa changes April 2026</text>

  <!-- "60 to 30 days Thailand visa" -->
  <rect x="504" y="172" width="180" height="28" fill="#0D2E14" rx="14" stroke="#34D399" stroke-width="1.5"/>
  <text x="594" y="191" text-anchor="middle" fill="#34D399" font-size="11" font-weight="600">60→30 day visa reduction</text>

  <!-- "DTV visa Thailand 2026" -->
  <rect x="475" y="216" width="158" height="28" fill="#0D2E14" rx="14" stroke="#34D399" stroke-width="1"/>
  <text x="554" y="235" text-anchor="middle" fill="#34D399" font-size="10" font-weight="600">DTV visa Thailand 2026</text>

  <!-- ── Long tail (top-left quadrant) ── -->
  <!-- "DTV vs LTR visa comparison" -->
  <rect x="90" y="135" width="178" height="28" fill="#0D1A2E" rx="14" stroke="#7EC8E3" stroke-width="1"/>
  <text x="179" y="154" text-anchor="middle" fill="#7EC8E3" font-size="10">DTV vs LTR visa comparison</text>

  <!-- "Thailand property visa 3M baht" -->
  <rect x="105" y="180" width="200" height="28" fill="#0D1A2E" rx="14" stroke="#7EC8E3" stroke-width="1"/>
  <text x="205" y="199" text-anchor="middle" fill="#7EC8E3" font-size="10">Thailand property visa 3M baht</text>

  <!-- "LTR visa eligibility 2026" -->
  <rect x="120" y="222" width="155" height="28" fill="#0D1A2E" rx="14" stroke="#7EC8E3" stroke-width="0.8"/>
  <text x="197" y="241" text-anchor="middle" fill="#7EC8E3" font-size="10">LTR visa eligibility 2026</text>

  <!-- ── High competition (bottom-right) ── -->
  <!-- "Thailand retirement visa requirements" -->
  <rect x="470" y="330" width="225" height="28" fill="#1E1500" rx="14" stroke="#F59E0B" stroke-width="1"/>
  <text x="582" y="349" text-anchor="middle" fill="#F59E0B" font-size="10">Thailand retirement visa requirements</text>

  <!-- "Thailand expat visa 2026" -->
  <rect x="500" y="375" width="175" height="28" fill="#1E1500" rx="14" stroke="#F59E0B" stroke-width="1"/>
  <text x="587" y="394" text-anchor="middle" fill="#F59E0B" font-size="10">Thailand expat visa 2026</text>

  <!-- "Thailand long stay visa" -->
  <rect x="520" y="413" width="155" height="26" fill="#1E1500" rx="13" stroke="#F59E0B" stroke-width="0.8"/>
  <text x="597" y="431" text-anchor="middle" fill="#8B8FA8" font-size="10">Thailand long stay visa</text>

  <!-- ── Avoid zone (bottom-left) ── -->
  <!-- "cost of living Chiang Mai" -->
  <rect x="115" y="355" width="180" height="28" fill="#0B1020" rx="14" stroke="#374151" stroke-width="1"/>
  <text x="205" y="374" text-anchor="middle" fill="#5A5E70" font-size="10">cost of living Chiang Mai</text>

  <!-- "Thailand expat community" -->
  <rect x="135" y="398" width="166" height="26" fill="#0B1020" rx="13" stroke="#374151" stroke-width="0.8"/>
  <text x="218" y="416" text-anchor="middle" fill="#5A5E70" font-size="10">Thailand expat community</text>

  <!-- Axis labels -->
  <!-- X axis label (bottom) -->
  <text x="80" y="470" fill="#5A5E70" font-size="10">← Low Search Volume</text>
  <text x="840" y="470" text-anchor="end" fill="#5A5E70" font-size="10">High Search Volume →</text>
  <text x="460" y="470" text-anchor="middle" fill="#8B8FA8" font-size="11" font-weight="600">SEARCH VOLUME</text>

  <!-- Y axis label (left, rotated) -->
  <text x="22" y="260" text-anchor="middle" fill="#8B8FA8" font-size="11" font-weight="600" transform="rotate(-90, 22, 260)">COMPETITION</text>
  <text x="55" y="82" fill="#5A5E70" font-size="10">Low ↑</text>
  <text x="55" y="447" fill="#5A5E70" font-size="10">High ↓</text>

  <!-- Footer -->
  <text x="450" y="510" text-anchor="middle" fill="#5A5E70" font-size="10">Act immediately on top-right keywords — the information gap from April 2026 policy changes closes fast.</text>
  <text x="450" y="528" text-anchor="middle" fill="#C9922A" font-size="10" font-weight="600" letter-spacing="0.5">PRIORITY: Visa changes coverage NOW · Build authority → target competitive terms later</text>
</svg>
