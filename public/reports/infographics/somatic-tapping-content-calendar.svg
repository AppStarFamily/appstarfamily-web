<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700">
  <rect width="900" height="700" fill="#0A0F1E"/>
  
  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#C9A84C">12-Month Content Calendar</text>
  
  <!-- Phase 1 Header -->
  <rect x="50" y="60" width="800" height="40" fill="#10B981" rx="5"/>
  <text x="450" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A0F1E">PHASE 1: Differentiation (Months 1-3) — Target: 10,000 downloads</text>
  
  <!-- Phase 1 Content -->
  <rect x="50" y="100" width="800" height="140" fill="#1E293B" rx="5"/>
  
  <text x="70" y="125" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10B981">Week 1-2:</text>
  <text x="150" y="125" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">"Tapping for Chronic Pain: What 12 Studies Show"</text>
  <text x="150" y="142" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Target: 1,600/mo | ASO: Add "chronic pain" to metadata</text>
  
  <text x="70" y="165" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10B981">Week 3-4:</text>
  <text x="150" y="165" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">"Tapping for Endometriosis: Complete Guide"</text>
  <text x="150" y="182" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Target: 880/mo | Leverage 2025 RCT</text>
  
  <text x="70" y="205" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#10B981">Week 5-6:</text>
  <text x="150" y="205" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">"Biometric Tapping: The Future of Anxiety Relief"</text>
  <text x="150" y="222" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Target: 480/mo | Innovation angle</text>
  
  <!-- Phase 2 Header -->
  <rect x="50" y="250" width="800" height="40" fill="#F59E0B" rx="5"/>
  <text x="450" y="275" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A0F1E">PHASE 2: Authority Building (Months 3-6) — Target: 50,000 downloads</text>
  
  <!-- Phase 2 Content -->
  <rect x="50" y="290" width="800" height="140" fill="#1E293B" rx="5"/>
  
  <text x="70" y="315" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F59E0B">Month 3:</text>
  <text x="150" y="315" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">PILLAR: "The Complete Guide to Somatic Tapping (2026)" — 5,000 words</text>
  <text x="150" y="332" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Target: "somatic tapping" (1,300/mo) | Internal link hub</text>
  
  <text x="70" y="355" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F59E0B">Month 4:</text>
  <text x="150" y="355" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">"Best Tapping Apps 2026: Tested &amp; Ranked" — Comparison table</text>
  <text x="150" y="372" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Target: "best tapping app" (6,600/mo) | Featured snippet target</text>
  
  <text x="70" y="395" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#F59E0B">Month 5:</text>
  <text x="150" y="395" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">"Tapping vs. Meditation: Which Works Faster?"</text>
  <text x="150" y="412" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Comparison content | CTA: Try biometric tapping</text>
  
  <!-- Phase 3 Header -->
  <rect x="50" y="440" width="800" height="40" fill="#38BDF8" rx="5"/>
  <text x="450" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#0A0F1E">PHASE 3: Scale (Months 6-12) — Target: 200,000 downloads, $1M ARR</text>
  
  <!-- Phase 3 Content -->
  <rect x="50" y="480" width="800" height="140" fill="#1E293B" rx="5"/>
  
  <text x="70" y="505" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#38BDF8">Months 7-8:</text>
  <text x="170" y="505" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">Athletic performance | Corporate wellness | Healthcare workers</text>
  <text x="170" y="522" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">B2B content, case studies, ROI calculators</text>
  
  <text x="70" y="545" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#38BDF8">Months 9-10:</text>
  <text x="180" y="545" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">Video content (YouTube) | Podcast guesting | Practitioner partnerships</text>
  <text x="180" y="562" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Authority expansion, backlinks, brand building</text>
  
  <text x="70" y="585" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#38BDF8">Months 11-12:</text>
  <text x="185" y="585" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF">Enterprise sales | API/platform play | International expansion</text>
  <text x="185" y="602" font-family="Arial, sans-serif" font-size="11" fill="#94A3B8">Scale to $1M ARR, 200K+ downloads</text>
  
  <!-- Footer -->
  <text x="450" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Scriptor · OpenClaw Research · appstarfamily.com</text>
  
  <!-- Legend -->
  <rect x="50" y="630" width="800" height="15" fill="#0A0F1E"/>
  <text x="450" y="642" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#C9A84C">Production: Phase 1 = 2 articles/mo | Phase 2 = 1 pillar + 1 article/mo | Phase 3 = 2-3 articles/mo + video</text>
</svg>