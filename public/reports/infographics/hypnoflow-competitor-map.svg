<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0A0F1E"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#C9A84C">Hypnos Flow — Competitor Positioning Map</text>
  
  <!-- Axis labels -->
  <text x="400" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#38BDF8">APP FOCUS →</text>
  <text x="30" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#38BDF8" transform="rotate(-90 30 300)">CONTENT SEO →</text>
  
  <!-- Grid lines -->
  <line x1="100" y1="100" x2="700" y2="100" stroke="#1E293B" stroke-width="1"/>
  <line x1="100" y1="500" x2="700" y2="500" stroke="#1E293B" stroke-width="1"/>
  <line x1="100" y1="100" x2="100" y2="500" stroke="#1E293B" stroke-width="1"/>
  <line x1="700" y1="100" x2="700" y2="500" stroke="#1E293B" stroke-width="1"/>
  <line x1="400" y1="100" x2="400" y2="500" stroke="#1E293B" stroke-width="1"/>
  <line x1="100" y1="300" x2="700" y2="300" stroke="#1E293B" stroke-width="1"/>
  
  <!-- Competitor dots -->
  <!-- HypnosisDownloads - high content, low app -->
  <circle cx="180" cy="180" r="12" fill="#EF4444"/>
  <text x="180" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">Hypnosis</text>
  <text x="180" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">Downloads</text>
  
  <!-- Mindset - medium content, medium app -->
  <circle cx="350" cy="250" r="10" fill="#F59E0B"/>
  <text x="350" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">Mindset</text>
  
  <!-- Reveri - medium app, low content -->
  <circle cx="450" cy="380" r="12" fill="#F59E0B"/>
  <text x="450" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">Reveri</text>
  
  <!-- HypnoBox - high app, low content -->
  <circle cx="620" cy="420" r="14" fill="#EF4444"/>
  <text x="620" y="405" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">HypnoBox</text>
  
  <!-- Harmony - high app, low content -->
  <circle cx="650" cy="350" r="12" fill="#EF4444"/>
  <text x="650" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">Harmony</text>
  
  <!-- Hypnos Flow target - high app, high content -->
  <circle cx="620" cy="180" r="16" fill="#10B981" stroke="#C9A84C" stroke-width="3"/>
  <text x="620" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10B981">Hypnos Flow</text>
  <text x="620" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">TARGET</text>
  
  <!-- Legend -->
  <rect x="520" y="480" width="160" height="70" fill="#1E293B" rx="5"/>
  <circle cx="540" cy="500" r="8" fill="#EF4444"/>
  <text x="555" y="505" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">Strong Incumbent</text>
  <circle cx="540" cy="520" r="8" fill="#F59E0B"/>
  <text x="555" y="525" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">Medium Competitor</text>
  <circle cx="540" cy="540" r="8" fill="#10B981"/>
  <text x="555" y="545" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">Opportunity Zone</text>
  
  <!-- Footer -->
  <text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Scriptor · OpenClaw Research · appstarfamily.com</text>
</svg>