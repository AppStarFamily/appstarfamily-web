<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#0A0F1E"/>
  
  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#C9A84C">Somatic Tapping — Competitor Positioning Map</text>
  
  <!-- Axis labels -->
  <text x="400" y="570" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#38BDF8">TAPPING FOCUS →</text>
  <text x="30" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#38BDF8" transform="rotate(-90 30 300)">BIOMETRIC INTEGRATION →</text>
  
  <!-- Grid lines -->
  <line x1="100" y1="100" x2="700" y2="100" stroke="#1E293B" stroke-width="1"/>
  <line x1="100" y1="500" x2="700" y2="500" stroke="#1E293B" stroke-width="1"/>
  <line x1="100" y1="100" x2="100" y2="500" stroke="#1E293B" stroke-width="1"/>
  <line x1="700" y1="100" x2="700" y2="500" stroke="#1E293B" stroke-width="1"/>
  <line x1="400" y1="100" x2="400" y2="500" stroke="#1E293B" stroke-width="1"/>
  <line x1="100" y1="300" x2="700" y2="300" stroke="#1E293B" stroke-width="1"/>
  
  <!-- Competitor dots -->
  <!-- The Tapping Solution - High tapping, low biometric -->
  <circle cx="620" cy="420" r="16" fill="#EF4444"/>
  <text x="620" y="410" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">Tapping Solution</text>
  <text x="620" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">24M sessions</text>
  
  <!-- NEUROFIT - Medium tapping, high biometric -->
  <circle cx="350" cy="180" r="14" fill="#F59E0B"/>
  <text x="350" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">NEUROFIT</text>
  <text x="350" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">Biometric</text>
  
  <!-- SomaShare - Low tapping, low biometric -->
  <circle cx="200" cy="380" r="12" fill="#F59E0B"/>
  <text x="200" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">SomaShare</text>
  
  <!-- ZenTap - Medium tapping, low biometric -->
  <circle cx="450" cy="400" r="10" fill="#F59E0B"/>
  <text x="450" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">ZenTap</text>
  
  <!-- Calm/Headspace - Low tapping, no biometric -->
  <circle cx="150" cy="450" r="12" fill="#64748B"/>
  <text x="150" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#FFFFFF">Calm/Headspace</text>
  
  <!-- Target Position - High tapping, high biometric -->
  <circle cx="650" cy="150" r="18" fill="#10B981" stroke="#C9A84C" stroke-width="3"/>
  <text x="650" y="130" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#10B981">TARGET</text>
  <text x="650" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#FFFFFF">AI + Biometric</text>
  <text x="650" y="175" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">Tapping</text>
  
  <!-- Opportunity Zone -->
  <rect x="550" y="80" width="140" height="100" fill="#10B981" opacity="0.1" rx="5"/>
  <rect x="550" y="80" width="140" height="100" fill="none" stroke="#10B981" stroke-width="2" stroke-dasharray="5,5" rx="5"/>
  <text x="620" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#10B981">OPPORTUNITY</text>
  <text x="620" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#10B981">High Tapping +</text>
  <text x="620" y="140" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#10B981">High Biometric</text>
  <text x="620" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#10B981">= Unoccupied</text>
  
  <!-- Legend -->
  <rect x="520" y="480" width="250" height="90" fill="#1E293B" rx="5"/>
  <circle cx="540" cy="500" r="8" fill="#EF4444"/>
  <text x="555" y="505" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">Strong Incumbent</text>
  <circle cx="540" cy="520" r="8" fill="#F59E0B"/>
  <text x="555" y="525" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">Medium Competitor</text>
  <circle cx="540" cy="540" r="8" fill="#10B981"/>
  <text x="555" y="545" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">Target Position</text>
  <circle cx="540" cy="560" r="8" fill="#64748B"/>
  <text x="555" y="565" font-family="Arial, sans-serif" font-size="10" fill="#FFFFFF">Meditation (not tapping)</text>
  
  <!-- Footer -->
  <text x="400" y="590" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#64748B">Scriptor · OpenClaw Research · appstarfamily.com</text>
</svg>